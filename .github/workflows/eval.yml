name: Model Regression Evaluator

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "app/**"
      - "data/**"
      - "prompts/**"
      - "tests/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/eval.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Build Docker image
        run: docker build -t model-regression-evaluator .

      - name: Run tests in Docker
        run: docker run --rm model-regression-evaluator python -m unittest discover -s tests

      - name: Run live model regression evaluator
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          S3_EVAL_BUCKET: ${{ secrets.S3_EVAL_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          docker run --rm \
            -e GEMINI_KEY \
            -e SLACK_WEBHOOK_URL \
            -e S3_EVAL_BUCKET \
            -e AWS_REGION \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            model-regression-evaluator
