name: Model Regression Evaluator

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "app/**"
      - "data/**"
      - "prompts/**"
      - "tests/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/eval.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Build Docker image
        run: docker build -t model-regression-evaluator .

      - name: Run tests in Docker
        run: docker run --rm model-regression-evaluator python -m unittest discover -s tests
